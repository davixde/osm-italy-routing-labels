services:
  nominatim:
    image: mediagis/nominatim:4.3
    container_name: nominatim-test
    ports:
      - "8080:8080"
    environment:
      - PBF_URL=https://github.com/davixde/osm-italy-routing-labels/releases/download/v1.0.0/italia_leggera.osm.pbf
      - ./nominatim-data:/var/lib/nominatim
    shm_size: '1gb'
    restart: always
