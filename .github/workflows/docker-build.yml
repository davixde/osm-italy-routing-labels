name: Build Precompiled Docker
 
on:
  workflow_run:
    workflows: ["Build"]
    types:
      - completed
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Controlla il codice del repository
        uses: actions/checkout@v4

      - name: Imposta la data corrente
        id: date
        run: echo "today=$(date +'%d-%m-%Y')" >> $GITHUB_OUTPUT

      - name: Libera spazio su disco
        run: |
          echo "=== Spazio iniziale ==="
          df -h
          echo "Rimozione software inutilizzato..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/lib/google-cloud-sdk
          sudo apt-get remove -y 'android-sdk*' 'dotnet-sdk*' 'ghc*'
          sudo apt-get autoremove -y
          sudo apt-get clean
          echo "=== Spazio finale ==="
          df -h

      - name: Accedi a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Avvia l'importazione di Nominatim
        run: |
          docker run -d \
            --name nominatim-precompiled \
            -e PBF_URL=https://github.com/${{ github.repository }}/releases/download/latest/italia_leggera.osm.pbf \
            -e NOMINATIM_OSM2PGSQL_CACHE=4000 \
            -e POSTGRES_SHARED_BUFFERS=2GB \
            -e POSTGRES_MAINTENANCE_WORK_MEM=4GB \
            -e POSTGRES_AUTOVACUUM_WORK_MEM=1GB \
            -e POSTGRES_WORK_MEM=100MB \
            -e POSTGRES_EFFECTIVE_CACHE_SIZE=8GB \
            -p 8080:8080 \
            mediagis/nominatim:4.3

      - name: Attendi il completamento dell'importazione
        run: |
          echo "Monitoraggio dell'importazione..."
          timeout=19800 # 5.5 ore
          elapsed=0
          while true; do
            # Verifica se il container è ancora in esecuzione
            if ! docker ps --filter "name=nominatim-precompiled" --format '{{.Names}}' | grep -q "nominatim-precompiled"; then
              echo "Errore: Il container si è arrestato inaspettatamente!"
              docker logs nominatim-precompiled || true
              exit 1
            fi
            
            # Verifica l'endpoint di stato
            status=$(curl -s --max-time 5 http://localhost:8080/status.php || true)
            if [[ "$status" == "OK" ]]; then
              echo "Importazione completata con successo!"
              break
            fi
            
            # Mostra i log ogni 2 minuti
            if (( elapsed % 120 == 0 )); then
              echo "Importazione in corso... (tempo trascorso: $((elapsed / 60))m)"
              docker logs --tail 20 nominatim-precompiled || true
            fi
            
            sleep 10
            elapsed=$((elapsed + 10))
            
            if [[ $elapsed -ge $timeout ]]; then
              echo "Errore: Raggiunto il timeout di 5.5 ore per l'importazione!"
              docker logs nominatim-precompiled || true
              exit 1
            fi
          done

      - name: Ferma e precompila il container in una nuova immagine
        run: |
          IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          TAG_DATE="${{ steps.date.outputs.today }}"
          
          echo "Arresto pulito dei servizi nel container..."
          docker exec nominatim-precompiled service apache2 stop || true
          docker exec nominatim-precompiled service postgresql stop || true
          
          echo "Arresto del container..."
          docker stop -t 60 nominatim-precompiled
          
          echo "Creazione dell'immagine $IMAGE_NAME:latest..."
          docker commit nominatim-precompiled $IMAGE_NAME:latest
          
          echo "Creazione del tag $IMAGE_NAME:$TAG_DATE..."
          docker tag $IMAGE_NAME:latest $IMAGE_NAME:$TAG_DATE
          
          echo "Invio dell'immagine a GHCR..."
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:$TAG_DATE
